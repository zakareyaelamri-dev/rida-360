<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIDA T.S. — 360° Performance Assessment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --teal:#0F6E56; --teal-mid:#1D9E75; --teal-light:#E1F5EE;
  --ink:#20201E; --ink-2:#5F5E5A; --ink-3:#888780;
  --paper:#F7F6F2; --card:#FFFFFF; --line:#E4E2DA; --line-2:#D3D1C7;
  --coral:#D85A30; --coral-bg:#FAECE7; --coral-dark:#712B13;
  --blue:#378ADD; --blue-bg:#E6F1FB; --blue-dark:#0C447C;
  --amber-bg:#FAEEDA; --amber-dark:#633806;
  --red-bg:#FCEBEB; --red-dark:#791F1F;
  --green-bg:#EAF3DE; --green-dark:#27500A;
  --purple-bg:#EEEBFA; --purple-dark:#3D3580;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Tahoma,system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:14px;}
body[dir="rtl"]{font-family:Tahoma,"Segoe UI",sans-serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:13px;padding:9px 12px;border:1px solid var(--line-2);border-radius:8px;background:#fff;color:var(--ink);width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal-mid);box-shadow:0 0 0 3px rgba(29,158,117,.12);}
label{font-size:12px;color:var(--ink-2);display:block;margin-bottom:5px;font-weight:600;}
.btn{padding:9px 18px;border-radius:8px;border:1px solid var(--line-2);background:#fff;color:var(--ink);font-size:13px;font-weight:600;}
.btn:hover{background:var(--paper);}
.btn-p{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn-p:hover{background:var(--teal-mid);}
.btn-d{background:#fff;border-color:#F0B5B5;color:var(--red-dark);}
.btn-sm{padding:5px 12px;font-size:12px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.b-teal{background:var(--teal-light);color:var(--teal);}
.b-amber{background:var(--amber-bg);color:var(--amber-dark);}
.b-red{background:var(--red-bg);color:var(--red-dark);}
.b-blue{background:var(--blue-bg);color:var(--blue-dark);}
.b-gray{background:#EFEEE8;color:var(--ink-2);}
.b-coral{background:var(--coral-bg);color:var(--coral-dark);}
.b-green{background:var(--green-bg);color:var(--green-dark);}
.b-purple{background:var(--purple-bg);color:var(--purple-dark);}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,#0A4A3A 0%,#0F6E56 55%,#1D9E75 100%);}
.login-card{background:#fff;border-radius:16px;padding:38px 34px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.login-logo{width:56px;height:56px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;margin:0 auto 14px;}
.login-logo-img{display:block;max-width:220px;width:100%;height:auto;margin:0 auto 18px;}
#app{display:none;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:50;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;}
.brand-dot{width:34px;height:34px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.userchip{display:flex;align-items:center;gap:10px;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--teal-light);color:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;}
.lang-btn{border:1px solid var(--line-2);background:#fff;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;}
.layout{display:flex;min-height:calc(100vh - 58px);}
.sidenav{width:220px;background:#fff;border-right:1px solid var(--line);padding:16px 10px;flex-shrink:0;}
body[dir="rtl"] .sidenav{border-right:none;border-left:1px solid var(--line);}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:start;}
.nav-item:hover{background:var(--paper);color:var(--ink);}
.nav-item.on{background:var(--teal-light);color:var(--teal);}
.nav-sec{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);padding:14px 12px 6px;}
.main{flex:1;padding:26px 28px;max-width:1440px;}
.pg-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.pg-sub{font-size:13px;color:var(--ink-2);margin-bottom:22px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:860px){.grid2,.grid3,.grid4{grid-template-columns:1fr;}.sidenav{width:64px;}.nav-item span{display:none;}.nav-sec{display:none;}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.stat-l{font-size:12px;color:var(--ink-2);font-weight:600;}
.stat-v{font-size:26px;font-weight:700;margin-top:4px;}
.stat-s{font-size:11.5px;color:var(--ink-3);margin-top:2px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
td:last-child:has(.btn){white-space:nowrap;width:1%;}
td:last-child:has(.btn) .btn{margin-inline-end:6px;}
td:last-child:has(.btn) .btn:last-child{margin-inline-end:0;}
th{text-align:start;font-size:11.5px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--line);}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FBFAF7;}
.rate-btns{display:flex;gap:5px;flex-shrink:0;}
.rb{width:32px;height:32px;border-radius:50%;border:1px solid var(--line-2);background:#fff;font-size:13px;font-weight:600;color:var(--ink-2);}
.rb.sel{background:var(--teal);color:#fff;border-color:var(--teal);}
.modal-bg{position:fixed;inset:0;background:rgba(20,20,18,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;}
.modal h3{font-size:16px;margin-bottom:16px;}
.frow{margin-bottom:12px;}
.check-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:13px;color:var(--ink);font-weight:400;cursor:pointer;}
.check-row input[type=checkbox]{width:auto;flex-shrink:0;margin:0;}
.tree-div{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.tree-head{background:var(--paper);padding:11px 14px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
.tree-body{padding:6px 14px 10px;}
.tree-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.tree-row:last-child{border-bottom:none;}
.empty{text-align:center;padding:36px 20px;color:var(--ink-3);font-size:13px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:600;display:none;z-index:200;}
.gapbar{display:grid;grid-template-columns:110px 1fr 44px;gap:8px;align-items:center;font-size:11.5px;color:var(--ink-2);margin-top:4px;}
.gtrack{height:6px;background:var(--paper);border-radius:3px;}
.gfill{height:6px;border-radius:3px;}
.section-t{font-size:14px;font-weight:700;margin-bottom:12px;}
.hint{font-size:12px;color:var(--ink-3);line-height:1.6;}
.axis-head{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin:18px 0 8px;}
.axis-title{font-weight:700;font-size:13.5px;}
.q-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:11px 4px;border-bottom:1px dashed var(--line);}
.q-text{font-size:13px;flex:1;line-height:1.6;}
.chk{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 0;cursor:pointer;}
.chk input{width:auto;}
/* ══ PRINT REPORT ══ */
#print-area{display:none;}
@media print{
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{display:block !important;position:absolute;top:0;left:0;width:100%;padding:10mm 12mm;background:#fff;}
  .no-print{display:none !important;}
  @page{size:A4;margin:8mm;}
}
.pr-head{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #0F6E56;padding-bottom:8px;margin-bottom:10px;}
.pr-logo{width:40px;height:40px;border-radius:50%;background:#0F6E56;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.pr-title{font-size:16px;font-weight:700;color:#0F6E56;}
.pr-sub{font-size:10px;color:#666;}
.pr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px 14px;font-size:10.5px;margin-bottom:8px;}
.pr-grid b{color:#0F6E56;}
.pr-sec{font-size:11px;font-weight:700;background:#E1F5EE;color:#0F6E56;padding:4px 8px;border-radius:4px;margin:8px 0 4px;}
.pr-table{width:100%;border-collapse:collapse;font-size:10px;}
.pr-table th{background:#F4F3EE;border:1px solid #DDD;padding:3px 6px;font-size:9.5px;text-transform:none;color:#444;}
.pr-table td{border:1px solid #DDD;padding:3px 6px;}
.pr-final{display:flex;justify-content:space-between;align-items:center;background:#0F6E56;color:#fff;border-radius:6px;padding:8px 14px;margin-top:8px;}
.pr-sign{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:14px;font-size:10px;}
.pr-sign div{border-top:1px solid #999;padding-top:4px;text-align:center;color:#555;}
</style>
</head>

function applyLang(){
  document.documentElement.lang=LANG;

/* ═══════════ CHAIN ═══════════ */
function divName(id){const d=ORG.divisions.find(x=>x.id===id);if(!d)return id||'—';return LANG==='ar'?d.ar:d.name;}
function getManagerOf(emp){
  if(DB.overrides[emp.id])return DB.employees.find(e=>e.id===DB.overrides[emp.id])||null;
  if(emp.isCEO)return null;
  if(emp.role==='Division Manager')return DB.employees.find(e=>e.isCEO)||null;
  if(emp.role==='Dept Manager'||emp.role==='Coordinator')
    return DB.employees.find(e=>e.role==='Division Manager'&&e.division===emp.division)||null;
  const dm=DB.employees.find(e=>e.role==='Dept Manager'&&e.division===emp.division&&e.dept===emp.dept);
  return dm||DB.employees.find(e=>e.role==='Division Manager'&&e.division===emp.division)||null;
}
function getSubordinates(m){return DB.employees.filter(e=>{const x=getManagerOf(e);return x&&x.id===m.id;});}
function isLeader(e){return getSubordinates(e).length>0;}
function getPeersOf(emp){
  if(DB.peerMap[emp.id])return DB.peerMap[emp.id].map(id=>DB.employees.find(e=>e.id===id)).filter(Boolean);
  return DB.employees.filter(e=>e.id!==emp.id&&!e.isCEO&&e.division===emp.division&&e.dept===emp.dept&&e.role===emp.role);
}

/* ═══════════ ENGINE ═══════════ */
function findEval(t,r){return DB.evaluations.find(v=>v.targetId===t&&v.raterId===r);}
function evalsFor(t){return DB.evaluations.filter(v=>v.targetId===t);}
function confirmedFor(t){return evalsFor(t).filter(v=>v.status==='confirmed');}
function behavioralPercent(scores,lead){
  let total=0,wsum=0;
  BEHAV_AXES.forEach(ax=>{
    if(ax.leadersOnly&&!lead)return;
    const arr=scores[ax.id]||[];if(!arr.length)return;
    total+=(arr.reduce((a,b)=>a+b,0)/arr.length)/5*100*ax.w;wsum+=ax.w;
  });
  return wsum?total/wsum:null;
}
function technicalPercent(tech){
  if(!tech)return null;let total=0,wsum=0;
  TECH_QS.forEach(q=>{if(tech[q.id]!==undefined&&tech[q.id]!==''){total+=Number(tech[q.id])*q.w;wsum+=q.w;}});
  return wsum?total/wsum:null;
}
function axisAvg(evList,axId){
  const ps=evList.map(v=>{const arr=v.scores[axId]||[];return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length/5*100:null;}).filter(x=>x!==null);
  return ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:null;
}
function computeResults(targetId){
  const tg=DB.employees.find(e=>e.id===targetId);
  const lead=isLeader(tg);
  const evs=confirmedFor(targetId);
  const by=ty=>evs.filter(v=>v.type===ty);
  const avgB=l=>{const ps=l.map(v=>behavioralPercent(v.scores,lead)).filter(p=>p!==null);return ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:null;};
  const mgrEv=by('manager')[0]||null;
  const B={manager:avgB(by('manager')),self:avgB(by('self')),peer:avgB(by('peer')),sub:avgB(by('subordinate'))};
  const counts={peer:by('peer').length,sub:by('subordinate').length};
  const hasSubs=getSubordinates(tg).length>0;
  const W=hasSubs?{manager:.4,self:.2,peer:.2,sub:.2}:{manager:.5,self:.25,peer:.25,sub:0};
  let bT=0,bW=0;
  Object.keys(W).forEach(k=>{if(W[k]>0&&B[k]!==null){bT+=B[k]*W[k];bW+=W[k];}});
  const behavioral360=bW?bT/bW:null;
  const technical=mgrEv?technicalPercent(mgrEv.tech):null;
  let final=null;
  if(behavioral360!==null&&technical!==null)final=behavioral360*.4+technical*.6;
  else if(behavioral360!==null)final=behavioral360*.4;
  return{B,counts,W,hasSubs,behavioral360,technical,final:final!==null?Math.round(final):null,
    devPlan:mgrEv?mgrEv.devPlan||null:null,mgrEv,lead,evs};
}

      if(existing&&existing.scores[ax.id])return existing.scores[ax.id][qi];
      return 0;});
    if(scores[ax.id].some(s=>!s))missing=true;
  });
  if(missing){toast(t('fillAllB'));return;}
  let tech=null,devPlan=null;
  if(type==='manager'){
    tech={};
    TECH_QS.forEach(q=>{tech[q.id]=TEMP.tech[q.id]!==undefined?TEMP.tech[q.id]:(existing&&existing.tech?existing.tech[q.id]:'');});
    if(TECH_QS.some(q=>tech[q.id]===''||tech[q.id]===undefined)){toast(t('fillAllT'));return;}
    devPlan={
      strengths:TEMP.dev.strengths!==undefined?TEMP.dev.strengths:(existing&&existing.devPlan?existing.devPlan.strengths:''),
      areas:TEMP.dev.areas!==undefined?TEMP.dev.areas:(existing&&existing.devPlan?existing.devPlan.areas:''),
      goals:TEMP.dev.goals!==undefined?TEMP.dev.goals:(existing&&existing.devPlan?existing.devPlan.goals:''),
      recommend:TEMP.dev.recommend!==undefined?TEMP.dev.recommend:(existing&&existing.devPlan?existing.devPlan.recommend:'')};
  }
  const{error}=await sb.from('evaluations').update({scores,tech,dev_plan:devPlan}).eq('id',evalId);
  if(error){toast(error.message);return;}
  Object.assign(existing,{scores,tech,devPlan});

}
function pickB(btn,ax,qi,val){

async function submitEval(targetId,type){
  const tg=DB.employees.find(e=>e.id===targetId);
  const lead=isLeader(tg);
  const existing=findEval(targetId,USER.id);
  const scores={};let missing=false;
  BEHAV_AXES.forEach(ax=>{
    if(ax.leadersOnly&&!lead)return;
    if(ax.peerExcluded&&type==='peer')return;
    if(ax.subExcluded&&type==='subordinate')return;
    scores[ax.id]=axisQs(ax,type).map((_,qi)=>{
      if(TEMP.behav[ax.id]&&TEMP.behav[ax.id][qi]!==undefined)return TEMP.behav[ax.id][qi];
      if(existing&&existing.scores[ax.id])return existing.scores[ax.id][qi];
      return 0;});
    if(scores[ax.id].some(s=>!s))missing=true;
  });
  if(missing){toast(t('fillAllB'));return;}
  let tech=null,devPlan=null;
  if(type==='manager'){
    tech={};
    TECH_QS.forEach(q=>{tech[q.id]=TEMP.tech[q.id]!==undefined?TEMP.tech[q.id]:(existing&&existing.tech?existing.tech[q.id]:'');});
    if(TECH_QS.some(q=>tech[q.id]===''||tech[q.id]===undefined)){toast(t('fillAllT'));return;}
    devPlan={
      strengths:TEMP.dev.strengths!==undefined?TEMP.dev.strengths:(existing&&existing.devPlan?existing.devPlan.strengths:''),
      areas:TEMP.dev.areas!==undefined?TEMP.dev.areas:(existing&&existing.devPlan?existing.devPlan.areas:''),
      goals:TEMP.dev.goals!==undefined?TEMP.dev.goals:(existing&&existing.devPlan?existing.devPlan.goals:''),
      recommend:TEMP.dev.recommend!==undefined?TEMP.dev.recommend:(existing&&existing.devPlan?existing.devPlan.recommend:'')};
  }
  const nowDate=new Date().toISOString().slice(0,10);
  const row={target_id:targetId,rater_id:USER.id,type,scores,tech,dev_plan:devPlan,status:'pending',eval_date:nowDate};
  const{data,error}=await sb.from('evaluations').upsert(row,{onConflict:'target_id,rater_id'}).select().single();
  if(error){toast(error.message);return;}
  const mapped=evalFromDb(data);
  if(existing)Object.assign(existing,mapped);
  else DB.evaluations.push(mapped);
  toast(existing?t('updated'):t('submitted'));go('rate');
}

async function saveTrain(trainId){
  const name=document.getElementById('tr-name').value.trim();
  if(!name){toast(t('trainName'));return;}
  const d={empId:document.getElementById('tr-emp').value,name,
  axis:document.getElementById('tr-axis').value,level:document.getElementById('tr-level').value,
  type:document.getElementById('tr-type').value,provider:document.getElementById('tr-prov').value.trim(),
  startDate:document.getElementById('tr-date').value,durVal:document.getElementById('tr-durval').value||1,
  durUnit:document.getElementById('tr-durunit').value,status:document.getElementById('tr-status').value,
  notes:document.getElementById('tr-notes').value.trim(),createdBy:USER.id};
  if(trainId){
    const{error}=await sb.from('trainings').update(trainToDb(d)).eq('id',trainId);
    if(error){toast(error.message);return;}
    const x=DB.trainings.find(y=>y.id===trainId);Object.assign(x,d);
  }else{
    const{data,error}=await sb.from('trainings').insert(trainToDb(d)).select().single();
    if(error){toast(error.message);return;}
    DB.trainings.push(trainFromDb(data));
  }
  closeModal();toast(t('trainSaved'));go(CURRENT_PAGE==='team'?'team':'trainings');
}
async function delTrain(id){
  if(!confirm(t('delTrain')))return;
  const{error}=await sb.from('trainings').delete().eq('id',id);
  if(error){toast(error.message);return;}
  DB.trainings=DB.trainings.filter(x=>x.id!==id);
  toast(t('trainDeleted'));go('trainings');
}

async function saveEmp(exId){
  const id=exId||document.getElementById('m-id').value.trim().toUpperCase();
  if(!id||!document.getElementById('m-name').value.trim()){toast(t('reqIdName'));return;}
  if(!exId&&DB.employees.find(e=>e.id===id)){toast(t('idExists'));return;}
  const d={id,
  name:document.getElementById('m-name').value.trim(),title:document.getElementById('m-title').value.trim(),
  phone:document.getElementById('m-phone').value.trim(),email:document.getElementById('m-email').value.trim(),
  division:document.getElementById('m-div').value,dept:document.getElementById('m-dept').value,
  role:document.getElementById('m-role').value,isAdmin:false,isCEO:false,
  perms:{employees:true,raters:true,approvals:true,allResults:true,org:true}};
  if(exId){const e=DB.employees.find(x=>x.id===exId);d.isCEO=e.isCEO;}
  const isadminEl=document.getElementById('m-isadmin');
  if(isadminEl){
    d.isAdmin=isadminEl.checked;
    if(d.isAdmin){
      const full=document.getElementById('m-adminlevel').value==='full';
      d.perms=full?{employees:true,raters:true,approvals:true,allResults:true,org:true}:{
        employees:document.getElementById('m-perm-employees').checked,
        raters:document.getElementById('m-perm-raters').checked,
        approvals:document.getElementById('m-perm-approvals').checked,
        allResults:document.getElementById('m-perm-allresults').checked,
        org:document.getElementById('m-perm-org').checked};
    }
  }
  const{error}=await sb.from('employees').upsert(empToDb(d));
  if(error){toast(error.message);return;}
  if(exId){const e=DB.employees.find(x=>x.id===exId);Object.assign(e,d);if(USER.id===exId)Object.assign(USER,d);}
  else DB.employees.push(d);
  closeModal();toast(t('saved'));go('employees');
}

      <td><span class="badge ${v.type==='self'?'b-teal':v.type==='manager'?'b-coral':v.type==='peer'?'b-blue':'b-purple'}">${v.type}</span></td>
      <td>${bp!==null?Math.round(bp)+'%':'—'}${v.type==='manager'&&v.tech?' <span class="hint">+ KPIs '+Math.round(technicalPercent(v.tech))+'%</span>':''}</td>
      <td class="hint">${v.date}</td>
      <td><button class="btn btn-sm" onclick="openAdminEditEval('${v.id}')">${t('editConfirmed')}</button>
      <button class="btn btn-sm" onclick="toggleHideFromTarget('${v.id}')">${v.hiddenFromTarget?t('unhideFromTarget'):t('hideFromTarget')}</button>
      <button class="btn btn-sm btn-d" onclick="adminDeleteEval('${v.id}')">${t('delEval')}</button></td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  return h;
}
async function confirmEval(id){
  const v=DB.evaluations.find(x=>x.id===id);if(!v)return;
  const{error}=await sb.from('evaluations').update({status:'confirmed',confirmed_at:new Date().toISOString(),confirmed_by:USER.id}).eq('id',id);
  if(error){toast(error.message);return;}
  v.status='confirmed';toast(t('confirmedLocked'));go('approvals');
}
async function toggleHideFromTarget(id){
  const v=DB.evaluations.find(x=>x.id===id);if(!v)return;
  const next=!v.hiddenFromTarget;
  const{error}=await sb.from('evaluations').update({hidden_from_target:next}).eq('id',id);
  if(error){toast(error.message);return;}
  v.hiddenFromTarget=next;toast(t('visChanged'));go('approvals');
}
async function adminDeleteEval(id){
  if(!USER.isAdmin)return;
  if(!confirm(t('delEvalConfirm')))return;
  const{error}=await sb.from('evaluations').delete().eq('id',id);
  if(error){toast(error.message);return;}
  DB.evaluations=DB.evaluations.filter(x=>x.id!==id);
  toast(t('evalDeleted'));go('approvals');
}
async function rejectEval(id){
  if(!confirm(t('rejConfirm')))return;
  const{error}=await sb.from('evaluations').delete().eq('id',id);
  if(error){toast(error.message);return;}
  DB.evaluations=DB.evaluations.filter(x=>x.id!==id);toast(t('rejected'));go('approvals');
}
async function confirmAll(){
  const ids=DB.evaluations.filter(v=>v.status==='pending').map(v=>v.id);
  if(!ids.length)return;
  const{error}=await sb.from('evaluations').update({status:'confirmed',confirmed_at:new Date().toISOString(),confirmed_by:USER.id}).in('id',ids);
  if(error){toast(error.message);return;}
  DB.evaluations.forEach(v=>{if(ids.includes(v.id))v.status='confirmed';});
  toast(t('allConfirmed'));go('approvals');
}
function pgOrg(){
  let h=`<div class="pg-title">${t('orgStruct')}</div><div class="pg-sub">${t('orgSub')}</div>
  <div class="card" style="background:var(--teal-light);border-color:#9FE1CB;">
  <b style="font-size:13px;">${t('chainT')}</b>
  <p class="hint" style="margin-top:6px;color:var(--teal);">${t('chainD')}</p></div>`;
  ORG.divisions.forEach(d=>{
    if(d.id==='EXEC'){
      const ceo=DB.employees.find(e=>e.isCEO);
      h+=`<div class="tree-div"><div class="tree-head"><span>${LANG==='ar'?d.ar:d.name}</span>
      <span class="hint">${t('managerL')}: ${ceo?ceo.name:'—'}</span></div><div class="tree-body">
      <div class="tree-row"><span><b>${LANG==='ar'?'يقيّم جميع مدراء الإدارات':'Rates all Division Managers'}</b></span></div>
      </div></div>`;
      return;
    }
    const mgr=DB.employees.find(e=>e.role==='Division Manager'&&e.division===d.id);
    const members=DB.employees.filter(e=>e.division===d.id&&e.role!=='Division Manager');
    h+=`<div class="tree-div"><div class="tree-head"><span>${LANG==='ar'?d.ar:d.name}</span>
    <span class="hint">${t('managerL')}: ${mgr?mgr.name:'—'} <span class="badge b-coral">${t('ratedByCEO')}</span></span></div><div class="tree-body">`;
    d.depts.forEach(dep=>{
      const dm=members.find(e=>e.role==='Dept Manager'&&e.dept===dep);
      const staff=members.filter(e=>e.dept===dep&&e.role!=='Dept Manager');
      h+=`<div class="tree-row"><span><b>${dep}</b>${dm?' — '+dm.name+` <span class="badge b-blue">${t('ratedByDiv')}</span>`:` <span class="hint">${t('noDeptMgr')}</span>`}</span>
      <span class="hint">${staff.length} ${t('staff')}</span></div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-bg').style.display='flex';}
function closeModal(){document.getElementById('modal-bg').style.display='none';}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target.id==='modal-bg')closeModal();});
let toastT=null;
function toast(m){const x=document.getElementById('toast');x.textContent=m;x.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>x.style.display='none',2600);}
loadLang();
tryResumeSession();
document.getElementById('l-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
